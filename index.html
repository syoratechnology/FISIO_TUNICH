<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Fisio Tunich — Servicios profesionales de fisioterapia y rehabilitación en Mérida, Yucatán. Recupera tu bienestar con tratamientos personalizados.">
  <meta name="keywords" content="fisioterapia, rehabilitación, Mérida, Yucatán, terapia física, masaje terapéutico">
  <meta name="author" content="Fisio Tunich">

  <title>Fisio Tunich — Fisioterapia & Bienestar</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" href="favicon.ico">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components/navbar.css">
  <link rel="stylesheet" href="css/components/footer.css">
  <link rel="stylesheet" href="css/utilities/animations.css">
  <link rel="stylesheet" href="css/pages/home.css">
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <div id="navbar-placeholder"></div>

  <!-- ========== MAIN CONTENT ========== -->
  <main>

    <!-- ── Hero Section ─────────────────── -->
    <section class="hero" id="hero">
      <div class="hero__bg">
        <!-- Placeholder: reemplaza con imagen real -->
        <div style="width:100%;height:100%;background:linear-gradient(135deg, hsl(168,40%,18%) 0%, hsl(200,30%,15%) 50%, hsl(220,25%,12%) 100%);"></div>
      </div>

      <div class="container-custom hero__content" data-animate="fade-up">
        <span class="hero__tag">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          Fisioterapia Profesional
        </span>

        <h1 class="hero__title">
          Tu camino hacia el <span>bienestar</span> comienza aquí
        </h1>

        <p class="hero__description">
          Tratamientos personalizados de fisioterapia con técnicas avanzadas. 
          Recupera tu movilidad, alivia el dolor y mejora tu calidad de vida 
          con atención profesional y dedicada.
        </p>

        <div class="hero__actions">
          <a href="/pages/agendar-cita.html" class="btn btn--accent btn--lg">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            Agendar Cita
          </a>
          <a href="/pages/servicios.html" class="btn btn--outline" style="border-color:rgba(255,255,255,0.3);color:white;">
            Ver Servicios
          </a>
          <div class="hero__stat" data-animate="fade-up" data-animate-delay="300">
            <span class="hero__stat-number" data-count-to="500" data-count-suffix="+">0</span>
            <span>Pacientes<br>atendidos</span>
          </div>
        </div>
      </div>

      <!-- Decorative shapes -->
      <div class="hero__shape hero__shape--1"></div>
      <div class="hero__shape hero__shape--2"></div>
      <div class="hero__shape hero__shape--3"></div>
    </section>

    <!-- ── Puedes agregar más secciones aquí ── -->
    <!-- Ejemplo: Servicios destacados, Sobre mí, Testimonios, CTA -->

  </main>

  <!-- ========== FOOTER ========== -->
  <div id="footer-placeholder"></div>

  <!-- ========== SCRIPTS ========== -->
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS (order matters) -->
  <script src="js/components/navbar.js"></script>
  <script src="js/utils/animations.js"></script>
  <script src="js/utils/template-loader.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
